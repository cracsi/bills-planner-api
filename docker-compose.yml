version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bills-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bills_planner
    ports:
      - '5432:5432'
    volumes:
      - bills_planner_data:/var/lib/postgresql/data

volumes:
  bills_planner_data:
